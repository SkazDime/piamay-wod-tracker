<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pia May's WOD Dashboard</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
h1,h2,h3 { margin-bottom: 0.2em; }
button { margin-top: 5px; padding: 8px 12px; }
input { margin: 3px 0; padding: 4px; }
#programStartInput { width: 120px; }
#wodContainer { white-space: pre-wrap; background:#f0f0f0; padding:10px; border-radius:5px; margin-top:10px;}
</style>
</head>
<body>

<h1>Pia May's WOD Dashboard</h1>

<!-- ---------------- Set Program Start ---------------- -->
<div>
    <label for="programStartInput">Program Start Date (MM/DD/YYYY):</label>
    <input type="text" id="programStartInput" placeholder="MM/DD/YYYY">
    <button onclick="setProgramStart()">Set Start Date</button>
</div>

<hr>

<!-- ---------------- Workout of the Day ---------------- -->
<h2>Workout of the Day</h2>
<h3 id="weekDisplay"></h3>
<h3 id="dayDisplay"></h3>
<pre id="wodContainer">Loading...</pre>

<!-- ---------------- Dashboard Metrics (placeholders) ---------------- -->
<h2>Coaching Metrics</h2>
<div id="metrics">
    <p>Weekly MEP: <span id="weeklyMEP">0</span></p>
    <p>Readiness: <span id="readiness">--</span></p>
    <p>Run Prediction: <span id="runPrediction">--</span></p>
    <p>Push Prediction: <span id="pushPrediction">--</span></p>
    <p>Sit Prediction: <span id="sitPrediction">--</span></p>
    <p>Fat Loss Projection: <span id="fatLossProjection">--</span></p>
    <p>Test Score: <span id="testScore">--</span></p>
</div>

<script>
// ---------------------- WOD Script Version ----------------------
const WOD_VERSION = "V1.01";
console.log("Loaded WOD script version:", WOD_VERSION);

// ---------------------- Default Program Start ----------------------
let programStart = null;

// ---------------- Parse MM/DD/YYYY safely ----------------------
function parseDateMMDDYYYY(str){
    if(!str) return null;
    const parts = str.split("/");
    if(parts.length !== 3) return null;
    const mm = parseInt(parts[0],10);
    const dd = parseInt(parts[1],10);
    const yyyy = parseInt(parts[2],10);
    if(isNaN(mm)||isNaN(dd)||isNaN(yyyy)) return null;
    return new Date(yyyy, mm-1, dd);
}

// ---------------- Load saved start date ------------------------
if(localStorage.getItem("programStart")){
    programStart = parseDateMMDDYYYY(localStorage.getItem("programStart"));
}

// ---------------- Running Progression -------------------------
const runningProgression = {
    1:{easy:"1.5 mi", intervals:"4 x 400m", tempo:"1 easy + 1 tempo"},
    2:{easy:"1.5 mi", intervals:"4 x 400m", tempo:"1 easy + 1 tempo"},
    3:{easy:"2 mi", intervals:"4 x 400m", tempo:"1 easy + 1 tempo"},
    4:{easy:"2 mi", intervals:"4 x 400m", tempo:"1 easy + 1 tempo"},
    5:{easy:"2 mi", intervals:"5 x 400m", tempo:"2 tempo"},
    6:{easy:"2 mi", intervals:"5 x 400m", tempo:"2 tempo"},
    7:{easy:"2.5 mi", intervals:"5 x 400m", tempo:"2 tempo"},
    8:{easy:"2.5 mi", intervals:"5 x 400m", tempo:"2 tempo"},
    9:{easy:"2.5 mi", intervals:"6 x 400m", tempo:"2 tempo"},
    10:{easy:"2.5 mi", intervals:"4 x 800m", tempo:"2 tempo"},
    11:{easy:"3 mi", intervals:"6 x 400m", tempo:"2.5 tempo"},
    12:{easy:"3 mi", intervals:"4 x 800m", tempo:"2.5 tempo"},
    13:{easy:"3 mi", intervals:"6 x 400m", tempo:"2.5 tempo"},
    14:{easy:"3 mi", intervals:"4 x 800m", tempo:"2.5 tempo"},
    15:{easy:"3 mi", intervals:"6 x 400m", tempo:"race pace"},
    16:{easy:"3 mi", intervals:"8 x 400m", tempo:"race pace"},
    17:{easy:"2.5 mi", intervals:"6 x 400m", tempo:"race pace"},
    18:{easy:"2.5 mi", intervals:"8 x 400m", tempo:"race pace"},
    19:{easy:"2 mi", intervals:"6 x 400m", tempo:"race pace"},
    20:{easy:"2 mi", intervals:"4 x 400m", tempo:"test prep"}
};

// ---------------- Get Program Week / Day -----------------------
function getProgramDay(){
    if(!programStart) return {week:0, day:0};
    const today = new Date();
    const todayNoTime = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const startNoTime = new Date(programStart.getFullYear(), programStart.getMonth(), programStart.getDate());

    if(todayNoTime < startNoTime) return {week:0, day:0};

    const diffDays = Math.floor((todayNoTime - startNoTime) / (1000*60*60*24));
    const week = Math.floor(diffDays / 6) + 1;
    const day = (diffDays % 6) + 1;
    if(week > 20) return {week:21, day:0}; // past program
    return {week, day};
}

// ---------------- Generate WOD Text -------------------------
function generateWorkout(week, day){
    if(week < 1 || week > 20) return "Program has not started or has finished.";

    const run = runningProgression[week];

    switch(day){
        case 1: return `Upper Body + Intervals

Warmup
5 min jog
Arm circles x15

Strength 3 rounds
Pushups 12
DB rows 12
Shoulder press 10
Plank 30 sec

Run Intervals
${run.intervals}

Rest 90 sec between intervals`;

        case 2: return `Lower Body + Core

3 rounds
Bodyweight squats 12
Reverse lunges 10 each
Glute bridge 15
Dead bugs 10 each
Side plank 20 sec`;

        case 3: return `Easy Run

Distance: ${run.easy}

Goal: Conversational pace
Build aerobic endurance`;

        case 4: return `Pushup Situp Volume

4 rounds
Pushups 12
Situps 15
Plank 30 sec

Rest 60 sec`;

        case 5: return `Tempo Run

Warmup 5 min jog

Run: ${run.tempo}

Goal: Moderate pace near test effort`;

        case 6: return `Recovery Day

Options:
30 min walk
Mobility work
Light cycling
Foam rolling`;

        default: return "Rest or program not scheduled for today.";
    }
}

// ---------------- Load Today's WOD ------------------------
function loadWOD(){
    const p = getProgramDay();
    if(p.week === 0){
        document.getElementById("weekDisplay").innerText = "Program has not started yet.\nPlease set a valid start date (MM/DD/YYYY) above.";
        document.getElementById("dayDisplay").innerText = "";
        document.getElementById("wodContainer").innerText = "";
        return;
    }

    document.getElementById("weekDisplay").innerText = "Week " + p.week + " of 20";
    document.getElementById("dayDisplay").innerText = "Day " + p.day;
    document.getElementById("wodContainer").innerText = generateWorkout(p.week, p.day);
}

// ---------------- Set Program Start -----------------------
function setProgramStart(){
    const input = document.getElementById("programStartInput").value;
    const parsed = parseDateMMDDYYYY(input);
    if(parsed){
        programStart = parsed;
        localStorage.setItem("programStart", input);
        alert("Program start date set to: " + input);
        loadWOD();
    } else {
        alert("Invalid date. Use MM/DD/YYYY format.");
    }
}

// ---------------- Pre-fill Input on Load ------------------
window.onload = () => {
    if(document.getElementById("programStartInput")){
        if(localStorage.getItem("programStart")){
            document.getElementById("programStartInput").value = localStorage.getItem("programStart");
        } else {
            document.getElementById("programStartInput").value = "03/16/2026";
        }
    }
    loadWOD();
};
</script>

</body>
</html>
